services:
  api1: &api 
    image: jrblatt/rinha-2026-rust:v0.1.3
    # image: rinha-fraud-2026:latest
    # build: .
    environment:
      - SOCK=/run/sock/api1.sock
    volumes:
      - sock:/run/sock
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: "160M"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    security_opt:
      - seccomp:unconfined

  api2:
    <<: *api
    environment:
      - SOCK=/run/sock/api2.sock

  lb:
    image: nginx:1.27-alpine
    depends_on:
      - api1
      - api2
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - sock:/run/sock
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "30M"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

volumes:
  sock:

services:
  api1: &api
    image: jrblatt/rinha-2026-rust:latest
    environment:
      - SOCK=/run/sock/api1.sock
    volumes:
      - sock:/run/sock
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160M"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  api2:
    <<: *api
    environment:
      - SOCK=/run/sock/api2.sock

  lb:
    image: nginx:1.27-alpine
    depends_on:
      - api1
      - api2
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - sock:/run/sock
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "30M"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

volumes:
  sock:
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=4m,mode=0777"

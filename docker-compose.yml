services:
  api1: &api 
    image: jrblatt/rinha-2026-rust:v0.0.9
    # image: rinha-fraud-2026:latest
    # build: .
    environment:
      - SOCK=/run/sock/api1.sock
    volumes:
      - sock:/run/sock
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: "160M"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
      cpuset: "0"

  api2:
    <<: *api
    environment:
      - SOCK=/run/sock/api2.sock
    cpuset: "1"

  lb:
    image: haproxy:3.0-alpine
    depends_on:
      - api1
      - api2
    ports:
      - "9999:9999"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - sock:/run/sock
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "30M"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
      cpuset: "2,3"

volumes:
  sock:
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=4m,mode=0777"
